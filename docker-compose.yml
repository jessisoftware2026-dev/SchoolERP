services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jessi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jessi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jessi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jessi_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jessi} -d ${POSTGRES_DB:-jessi_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jessi-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: jessi-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://jessi:jessi_secret@postgres:5432/jessi_erp?schema=public}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000},http://192.168.1.110.nip.io:${WEB_PORT:-3000}
    ports:
      - "${API_PORT:-4000}:4000"

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: jessi-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AI_PORT: ${AI_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://jessi:jessi_secret@postgres:5432/jessi_erp?schema=public}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${AI_PORT:-8000}:8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: jessi-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  redisdata:
